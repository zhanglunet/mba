relation:
  origin: >-
    分析:Anthropic 的起源与 Dario'从 OpenAI 出走、为 AI 安全另立治理'的选择绑定——
    公益公司(PBC)结构 + Amodei 兄妹 + 资深研究员团队是品牌起源的真实锚点。
  category: >-
    分析:Dario 把 Anthropic 定位在'安全优先的前沿大模型'品类(Claude + 可解释性/对齐研究),
    以'负责任扩展'与安全叙事区别于纯能力竞赛。
  leverage: >-
    分析:GPT-2/3 与 RLHF 的原创研究血统 + 顶尖对齐/安全人才密度,是 Anthropic 的核心杠杆。
  identity: >-
    分析:'AI 安全布道者 + 公益公司'塑造 Dario 与 Anthropic 的身份;但'又要安全、又要竞速商业化'
    的张力持续被审视。Anthropic 创始人非 MBA 评委,审计不触发 self-conflict --panel-drop。
  signal: >-
    分析:Claude 的能力迭代、大额融资、影响力评选是可核验信号;但安全承诺与商业化速度的平衡、
    盈利路径需 live 核验,不把叙事当兑现。
