# founders/tal-education.yaml — 好未来/学而思 创始人维度(履历 + 创始人↔品牌关系)
#
# 数据来源:复用 perspectives/zhangbangxin-perspective/references/research/06-timeline.md。
# 反捏造:evidence 为 provenance(报道引述/自述/公开记录);relation 为标注的分析。
# 强锁 2016–2019;2021 双减为分水岭,其后战略/观点不臆测,千亿愿景已中断不当兑现成绩。
brand: tal-education
founder:
  name_cn: 张邦鑫
  name_en: Zhang Bangxin
  role: 创始人 / 董事长
  status: 现任
  perspective_slug: zhangbangxin
career:
  - period: "2002"
    milestone: "北大生科院硕博连读期间做家教;立'开放旁听 / 随时退费'的道德底线"
    evidence: "报道引述 / 自述 [CEIBS][21](06-timeline)"
    lens: [origin]
  - period: "2003"
    milestone: "与曹允东注册公司、开课外辅导班(奥数网 / 学而思前身)"
    evidence: "公开记录 + 自述"
    lens: [origin, category]
  - period: "~2003 后"
    milestone: "小班教学、招 211/985 应届生做师资、严格价值观筛选,靠口碑增长"
    evidence: "报道引述 [CEIBS]"
    lens: [leverage]
  - period: "2010-10"
    milestone: "学而思在纽交所上市(首家赴美上市的中小学教培机构)"
    evidence: "公开记录"
    lens: [signal]
  - period: "2013-08"
    milestone: "更名'好未来',定位'用科技与互联网推动教育进步'"
    evidence: "公开记录"
    lens: [category, identity]
  - period: "2016-01"
    milestone: "好未来年会:'三句话' + 十年千亿愿景,进入管理增长阶段"
    evidence: "semi 演讲实录 [年会16]"
    lens: [identity, leverage]
  - period: "2019-05"
    milestone: "国际人工智能与教育大会:'为每个孩子提供最适合的教育'(两个理念 + AI 三次实践)"
    evidence: "semi 演讲实录 [AI19]"
    lens: [category]
  - period: "2021-07"
    milestone: "'双减'政策落地:义务教育阶段学科类培训大幅收紧,学而思 K12 学科培训归零"
    evidence: "公开记录,分水岭(06-timeline)"
    lens: [signal]
relation:
  origin: >-
    分析:好未来的起源叙事扎在张邦鑫做家教立下的'教不好=抢钱''开放旁听/随时退费'道德底线,
    这是品牌口碑增长的真实源头。
  category: >-
    分析:从奥数网/学而思前身到更名'好未来'、再到 2019 提'科技做大规模低价格高品质的公平普惠',
    创始人把品类从补习班重定义为科技与教育的长期主义。
  leverage: >-
    分析:小班教学 + 价值观选人 + 口碑增长 + 2016 后的管理增长,是好未来的经营杠杆;
    十年千亿愿景是其规模化雄心的表达。
  identity: >-
    分析:更名'好未来'与年会'三句话'塑造了品牌身份;审计须 --panel-drop zhangbangxin
    (self-conflict:案例几乎全是好未来/学而思)。
  signal: >-
    分析:纽交所上市是可核验的真实信号;但 2021 双减为分水岭——学而思 K12 归零、千亿愿景中断,
    其后战略不臆测,不把中断的愿景当兑现成绩。
sources:
  - "perspectives/zhangbangxin-perspective/references/research/06-timeline.md"
  - "metric-brand-auditor/self-conflict.yaml (zhangbangxin → 好未来/学而思/TAL)"
