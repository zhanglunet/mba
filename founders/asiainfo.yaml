relation:
  origin: >-
    分析:亚信的起源与田溯宁'把互联网带回中国、建骨干网'的基础设施建设者身份高度绑定——
    创始团队(田溯宁、丁健等留美学生)与 ChinaNet 是品牌起源叙事的真实锚点。
  category: >-
    分析:从 ChinaNet 骨干网到电信 BSS 软件、再到'云网安'数字化转型,田溯宁的技术聚合视角
    (云/大数据/物联网融合的'裂变效应')定义了亚信的 B2B 电信软件品类。
  leverage: >-
    分析:与运营商/政企的深度关系 + 二十余年电信软件积累(市场份额第一)是亚信的核心杠杆;
    宽带资本对云计算/企业互联网的生态投资是其延伸。
  identity: >-
    分析:互联网建筑师、长者、终身学习者塑造了田溯宁与亚信的身份;但亚信未抓住消费互联网红利,
    身份偏 B2B 数字基础设施而非 to C。亚信创始人非 MBA 评委,审计不触发 self-conflict --panel-drop。
  signal: >-
    分析:纳斯达克、港股两度上市与电信软件份额第一是可核验的真实信号;但近年营收/净利波动
    (2024 净利同比下降)与资产重组需 live 核验,不把历史地位当作当下成绩。
