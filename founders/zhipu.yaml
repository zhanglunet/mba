    是智谱相对同行的品类定义(全栈:语言/多模态/智能体)。
  leverage: >-
    分析:KEG 多年技术积累 + AMiner 早期现金流 + 高强度研发(招股书累计约 44 亿、研发人员占比 74%)
    + GLM 每 2-3 个月一次基座迭代,是智谱的经营杠杆。
  identity: >-
    分析:清华系、学术与产业融合、低调务实(唐杰效仿王选、敲钟当天站在团队中而非 C 位)塑造了品牌身份;
    智谱创始人均非 MBA 评委,审计不触发 self-conflict --panel-drop。
  signal: >-
    分析:港交所上市(全球大模型第一股)、市场份额中国第二是可核验的真实信号;但盈利路径与外界对
    AI 过度投资的担忧需 live 核验,不把估值/份额当作已兑现的长期成绩。
