# collabs/asiainfo--zhipu.yaml — 假想晚餐:田溯宁(亚信)× 唐杰(智谱)
#
# ⚠️ 反捏造:这是一场**假想对谈**。两人发言均为 **AI 演绎**,基于其**公开记录在案的立场/观点**
# (田溯宁:搜狐诺亚精选 2016 等 curl 一手;唐杰:财联社/虎嗅/创业邦 curl 一手 + founders/zhipu.yaml),
# **非本人真实发言、非双方证实的真实合作**。合作点为基于两品牌真实属性的**假想推演**,不谎称已发生。
# 两位创始人均非 MBA 评委(无 perspective 声音语料),立场只落在其公开观点上,不生成新引言。
brands: [asiainfo, zhipu]
featured: true            # 首页「创始人晚餐 · 亮点」精选此场(build_collab_dinners 生成首页 DINNER 块)
home_highlight: leverage  # 首页亮点展示的镜头(leverage 那道菜:「你的渠道,我的模型」)
title: "骨干网遇见基座模型:两代科技基础设施建设者的一顿饭"
scene: >-
  假想场景:一间安静的中餐厅。互联网时代把 ChinaNet 骨干网带回中国的田溯宁,
  与 AGI 时代把清华 KEG 技术变成 GLM 基座模型的唐杰,隔桌聊起"基础设施"这件事——
  以下对谈为 AI 演绎双方公开立场,非真实发生。
courses:
  - lens: origin
    exchange:
      - who: asiainfo
        say: >-
          我们那代人做的是把互联网'带回中国'——建 ChinaNet 骨干网、写电信软件,
          先把路修出来,应用才长得出来。基础设施是慢功夫,但它决定别人能跑多快。
      - who: zhipu
        say: >-
          智谱做的其实是同一件事的新一层:把清华 KEG 多年的技术,变成 GLM 这样的
          AGI 基座模型。基座之于智能,像骨干网之于互联网——是别人调用的底座。
    idea: >-
      两代'科技基础设施建设者'的叙事共鸣:把亚信'修路'的经验,迁移到大模型基座的
      产业落地上——共同讲一个'从互联网基建到智能基建'的中国科技传承故事。
  - lens: category
    exchange:
      - who: asiainfo
        say: >-
          我一直看好技术聚合:云、大数据、物联网叠在一起会有'裂变效应'。亚信的品类
          就长在电信 BSS 与'云网安'数字化转型里,是 B2B 的产业互联网。
      - who: zhipu
        say: >-
          我们把 AI 当 scaling law 来做,GLM 走全栈——语言、多模态、智能体。
          如果把大模型作为你说的那种'聚合'里的新一层,产业互联网就多了一层智能底座。
    idea: >-
      共定义'AI × 电信/产业'品类:把 GLM 作为亚信'云网安'数字化转型栈里的智能层,
      让大模型成为产业互联网的新基础设施层。
  - lens: leverage
    exchange:
      - who: asiainfo
        say: >-
          亚信最硬的杠杆是运营商和政企的深度关系,加上二十多年电信软件的份额积累——
          这类客户认的是可靠、合规、能长期陪跑。
      - who: zhipu
        say: >-
          智谱最硬的是模型能力与研发密度,但要进运营商、进央国企,渠道和合规是门槛。
          两边正好互补:你的渠道,我的模型。
    idea: >-
      亚信渠道 × 智谱模型 = 行业大模型落地杠杆:由亚信把 GLM 打包进面向运营商/政企的
      解决方案,做电信级、可私有化部署的行业大模型与 AI agent。
  - lens: identity
    exchange:
      - who: asiainfo
        say: >-
          我这辈子的标签是'互联网建筑师',也是个终身学习者。做基础设施的人习惯低调,
          价值靠时间证明,不靠风口。
      - who: zhipu
        say: >-
          我也更认同学术与产业融合、少露面、把事做扎实这条路。两个都不爱站 C 位的团队,
          反而更容易在政企场景里建立长期信任。
    idea: >-
      两个'低调务实的基础设施派'身份相合:联合品牌在政企/运营商场景里的公信力,
      比单打独斗更容易被信任——把'可靠'做成共同的身份资产。
  - lens: signal
    exchange:
      - who: asiainfo
        say: >-
          亚信两度上市、电信软件份额第一是真信号;但我也不回避,近年营收和净利有波动,
          得靠新增长点。
      - who: zhipu
        say: >-
          智谱刚在港交所上市、市场份额中国第二也是真信号,但盈利路径还在证明中。
          与其各讲估值,不如一起跑一个能核验的行业试点。
    idea: >-
      合作的可核验里程碑,而非估值叙事:先做一个运营商/政企的行业大模型 POC(概念验证),
      用真实交付的信号说话——这也对两家'商业化承压'的诚实回应。
takeaways:
  - "行业大模型落地:亚信把 GLM 打包进面向运营商/政企的'云网安'解决方案,做可私有化部署的电信级大模型与 AI agent。"
  - "渠道 × 模型互补:亚信补智谱的政企渠道与合规陪跑,智谱补亚信的 AI 能力,共同吃'产业智能化'的增量。"
  - "生态资本联动:田溯宁的宽带资本长期投云计算/企业互联网,可作为智谱行业落地的生态与资本纽带(假想)。"
  - "叙事协同:把'从骨干网到基座模型'讲成一个中国科技基础设施传承的联合故事,增强双方在政企场景的公信力。"
tensions:
  - "电信/数据强监管:运营商与央国企采购流程长、合规门槛高,大模型进场并不轻松。"
  - "落地 ROI 未证实:行业大模型的商业化价值仍在早期,POC 到规模化之间有很大不确定性,需 live 核验。"
  - "体量与文化差异:一家是二十余年的电信软件公司、一家是年轻的 AGI 公司,节奏与组织文化差异可能拖慢协同。"
  - "两家都在'证明商业化'的压力期,合作若变成互相背书的估值叙事,反而背离双方务实的底色。"
sources:
  - "founders/asiainfo.yaml · founders/zhipu.yaml(两位创始人的履历与 5 镜头品牌关系)"
