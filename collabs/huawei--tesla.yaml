# collabs/huawei--tesla.yaml — 假想晚餐:任正非(华为)× 马斯克(Tesla)
#
# ⚠️ 反捏造:这是一场**假想对谈**。两人发言均为 **AI 演绎**,基于其**公开记录在案的立场/观点**
# (任正非:MBA 评委 renzhengfei 的表达 DNA + founders/huawei.yaml——华为的冬天/灰度哲学/备胎自立/
# 以客户为中心;马斯克:MBA 评委 musk 的表达 DNA + founders/tesla.yaml——第一性原理/工厂即产品/
# 制造教义),**非本人真实发言、非双方证实的真实合作**。合作点为基于两品牌真实属性的**假想推演**,
# 不谎称已发生;paraphrase 不冒充逐字原话。华为智能汽车解决方案(不造车、做增量部件/鸿蒙智行/ADS 智驾)
# 与特斯拉 FSD 为公开已知业务,近期销量/进展/制程一律需 live 核验。
brands: [huawei, tesla]
featured: false           # 首页「创始人晚餐 · 亮点」精选仍为 deepseek--nvidia(芯片与模型);本场为第三场
title: "全栈自研的两种活法:被制裁淬炼的人,和被制造地狱淬炼的人,坐到了一桌"
scene: >-
  假想场景:一间没有 logo 的私房菜馆。43 岁揣 2.1 万元创业、把华为从代理做到全球电信龙头、
  又在制裁里靠"备胎"活下来的任正非,与把软件财富押进硬核制造、在 Model 3 制造地狱里
  淬出"工厂即产品"的马斯克,隔桌聊起同一个执念——"什么都自己造"。
  一个被制裁逼着自研,一个被制造逼着自研;以下对谈为 AI 演绎双方公开立场,非真实发生。
courses:
  - lens: origin
    exchange:
      - who: huawei
        say: >-
          华为最值钱的不是顺风时全球第一,是我们在营收最好的时候就写《华为的冬天》——
          把危机意识变成制度。所以 2019 年真的冬天来了,我们有备胎。43 岁、2.1 万元起步的人,
          从一开始就知道:活下去,是最高纲领。
      - who: tesla
        say: >-
          我懂那种被逼到墙角的感觉。2008 年特斯拉和 SpaceX 差点一起死,我选择同时押上、
          不外包风险。制造地狱那两年我睡在工厂里——不是表演,是因为工厂本身就是产品。
          逆境不是要熬过去的东西,逆境是把组织重铸成型的那台机器。
    idea: >-
      两代"把生存危机制度化"的工业家叙事共鸣:一个被制裁逼出"备胎/自立",一个被产能逼出
      "工厂即产品"。可共讲一个"逆境即护城河、危机意识即长期资产"的公共故事(假想)。
  - lens: category
    exchange:
      - who: tesla
        say: >-
          我做的是整车——把电动车从"环保妥协"重新定义成"人们真正想要的更好的车"。
          我开创了一个品类,然后逼着全世界在更高的标准上竞争。品类是我立身的地方。
      - who: huawei
        say: >-
          我们不造车。华为在汽车里做的是增量部件——鸿蒙座舱、ADS 智能驾驶、三电、云。
          我这辈子做的都是"别人打仗,我卖铲子和弹药"的生意:电信设备如此,汽车也如此。
          你定义整车,我想把每辆车的"大脑和神经"做到最好。
    idea: >-
      整车 × Tier1 的互补(假想):特斯拉定义整车品类,华为做智驾/座舱/三电的增量部件——
      理论上一个"造车的"和一个"武装车的"可以不在同一条战壕。但前提是特斯拉愿意用外部供应商,
      而这恰恰是它最不愿意的(见诚实盒)。
  - lens: leverage
    exchange:
      - who: huawei
        say: >-
          我的杠杆是垂直整合加长期研发密度——被切断先进制程、EDA、安卓之后,还能靠昇腾、麒麟、
          鸿蒙自己接上。制裁没削掉我"自己造关键环节"的意志,反而把它逼成了肌肉记忆。
      - who: tesla
        say: >-
          我们其实是同一种物种。我信"删掉那个零件"——最好的供应链是没有供应链,电池、芯片(Dojo)、
          软件、超充,能自研就自研。但正因为我们都要全栈自研,你我更可能是对手,不是搭档:
          你的 ADS 想进我的车,我第一反应是,那我的 FSD 呢?
    idea: >-
      两个"全栈自研"信徒本可在部件上互补(华为智驾/座舱 + 特斯拉整车),但也正因都执着于
      自己掌控全栈,天然是竞争而非合作——尤其在中国智驾市场,ADS 与 FSD 是正面对手(见诚实盒)。
  - lens: identity
    exchange:
      - who: tesla
        say: >-
          我是那种会在 X 上发一整天、把 CEO 变成品牌本身的人。高调是我的杠杆——
          零广告却人尽皆知,靠的就是我自己站在最前面。
      - who: huawei
        say: >-
          我正相反。华为搞轮值董事长、不上市、不做个人崇拜,我个人持股约 1%。
          我尽量不成为华为的"脸"——因为绑定个人的组织走不远,能穿越创始人的机构才走得远。
          喧嚣留给市场,我更信制度和奋斗者。
    idea: >-
      两种极端身份哲学的对照:最高调的创始人图腾 × 最低调的集体领导。若同台,"个人即品牌"与
      "机构超越个人"的辩论本身,就是一则关于科技公司如何传承的公共叙事。
  - lens: signal
    exchange:
      - who: huawei
        say: >-
          Mate 60 的国产 7nm、问界的销量回升是真信号;但我诚实说,先进制程的持续自立、
          鸿蒙生态的完整度都还悬着——一次突破不等于封锁已解。信号要用时间去兑现。
      - who: tesla
        say: >-
          我这边全球交付、超充、数据飞轮也是真信号;但 FSD"明年全自动驾驶"喊了很多年、
          Robotaxi 一再跳票,这些我也得认。我们俩其实被问同一个问题:突破到底能不能持续,
          还是只是一次高光。
    idea: >-
      与其各讲销量和市值,不如共同推一个可核验的公开基准——比如"智能驾驶安全里程/接管率"的
      第三方口径,让"突破"从叙事变成可审计信号。诚实说:双方口径与地缘限制,使这种协作现实中极难落地。
takeaways:
  - "整车 × Tier1 互补(假想):特斯拉定义整车品类,华为做鸿蒙座舱/ADS 智驾/三电增量部件——理论上'造车的'与'武装车的'可分工。"
  - "生存工业家的共同叙事:一个被制裁逼出'备胎/自立',一个被产能逼出'工厂即产品',可共讲'逆境即护城河'。"
  - "全栈自研的双刃:两人都信'什么都自己造',本可在部件上互补,却也因此天然是竞争者——尤其中国智驾市场 ADS vs FSD。"
  - "身份哲学互补:最高调的创始人图腾 × 最低调的集体领导,同台辩论'公司如何超越创始人'本身就是公共叙事。"
tensions:
  - "地缘与出口管制:美国 EV 龙头 × 受制裁的中国科技公司,任何实质合作在现实政策环境下高度敏感、几乎不被允许——这是最大的不搭。"
  - "结构性利益冲突:华为 ADS 智驾与特斯拉 FSD 在中国市场是正面对手,两者都要全栈自研,更像竞争者而非天然盟友。"
  - "身份与文化南辕北辙:高调的个人图腾(马斯克/X 外溢)× 低调的集体领导(任正非/轮值制/不上市),组织文化差异极大,协同摩擦高。"
  - "数字待核验:特斯拉交付/FSD 进展、华为智驾/问界销量/先进制程均需 live 核验;合作若沦为互相背书,反而背离两家'用真实产出说话'的底色。"
