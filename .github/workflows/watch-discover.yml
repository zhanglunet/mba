name: Watch Discover

# 每日自动**发现**舆情候选事件(Google News RSS)→ dedup 现有事件 → 开 PR 待人工核验。
#
# 反捏造(docs/15 §边界):脚本只回填**源 feed 的逐字标题/日期/URL**;
# dim/severity/direction/lens_map 留 TODO,由人工/评委判断后才入库——**不做自动打分**。
# 候选进 PR、**不自动合并**;人工 curate 合规项 → 粘进 watch/<slug>/events.yaml → 删候选 → validate_watch。
#
# 注:本文件是**新增 workflow**,首次运行可能被 GitHub 安全策略 withhold,需在 Actions 页点一次
#     「Approve and run」(与 daily-report 首启同)。

on:
  schedule:
    - cron: "17 2 * * *" # 02:17 UTC ≈ 10:17 北京;避开整点错峰
  workflow_dispatch:
    inputs:
      days:
        description: "回看窗口天数(默认 3)"
        required: false
        default: "3"
      limit:
        description: "每品牌候选上限,防噪音灌水(默认 12)"
        required: false
        default: "12"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: watch-discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Discover candidates
        id: disc
        run: |
          DATE=$(date -u +%F)
          OUT="watch/_candidates/${DATE}.md"
          DAYS="${{ github.event.inputs.days || '3' }}"
          LIMIT="${{ github.event.inputs.limit || '12' }}"
          python3 scripts/watch-tools/fetch_candidate.py discover \
            --days "$DAYS" --limit "$LIMIT" --out "$OUT" | tee /tmp/disc.txt
          N=$(grep -oE 'discover: [0-9]+' /tmp/disc.txt | grep -oE '[0-9]+' | head -1 || echo 0)
          echo "new=${N:-0}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Classify candidates（LLM 预分类 → 建议入库 adopt）
        id: cls
        if: steps.disc.outputs.new != '0'
        env:
          # 多 provider,配哪个就用哪个(GLM 优先 → OpenAI 兼容 → Anthropic)。都没配则优雅跳过。
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MBA_CLASSIFY_MODEL: ${{ vars.MBA_CLASSIFY_MODEL }}
        run: |
          DATE="${{ steps.disc.outputs.date }}"
          # 无 key 时脚本优雅跳过、不写 adopt(退回人工 triage 流)。反捏造:模型只分类,不改引文。
          python3 scripts/watch-tools/classify_candidates.py \
            --in "watch/_candidates/${DATE}.json" \
            --adopt "watch/_adopt/auto-${DATE}.yaml" \
            --report /tmp/classify-report.md || echo "classify 失败,退回人工 triage 流"
          if [ -f "watch/_adopt/auto-${DATE}.yaml" ]; then
            echo "auto=1" >> "$GITHUB_OUTPUT"
          else
            echo "auto=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto PR（LLM 建议入库 → watch-adopt 折入,人工审 diff）
        if: steps.disc.outputs.new != '0' && steps.cls.outputs.auto == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ steps.disc.outputs.date }}"
          N="${{ steps.disc.outputs.new }}"
          BR="watch-auto/${DATE}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          git add watch/_candidates watch/_adopt
          git commit -m "chore(watch): LLM 预分类建议入库 ${DATE}（候选 ${N} 条）"
          git push -f origin "$BR"
          TITLE="feat(watch): ${DATE} 舆情建议入库（LLM 预分类，人工审 diff 合并）"
          # 用 printf 组装 PR 正文(不用 heredoc/反引号,避开 YAML 缩进与命令替换坑)。
          {
            printf '自动发现 + **LLM 预分类**的建议入库。watch-adopt 已把高置信项折入 events.yaml —— **你只需审最终 events.yaml diff 再合并**(合并=人工闸门)。低置信/丢弃项见下方报告,可在本 PR 的 Cloudflare 预览 /watch/triage.html 手动补。\n\n'
            printf '反捏造:标题/日期/URL 逐字取自源 feed;dim/severity/direction/lens 为 model-judged 分类,不假装客观、不改任何审计分数。\n\n'
            cat /tmp/classify-report.md 2>/dev/null || true
          } > /tmp/pr-body.md
          if gh pr create --base main --head "$BR" --title "$TITLE" --body-file /tmp/pr-body.md 2>/tmp/pr.err; then
            echo "✅ 已开建议入库 PR。"
          elif gh pr edit "$BR" --title "$TITLE" --body-file /tmp/pr-body.md 2>/dev/null; then
            echo "✅ 同分支已有 PR,已更新。"
          else
            COMPARE="${{ github.server_url }}/${{ github.repository }}/pull/new/${BR}"
            echo "::notice::分支 ${BR} 已推,自动开 PR 被拒,手动开:${COMPARE}"
            echo "分支已推但自动开 PR 被拒。手动开 PR → ${COMPARE}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish candidates（无 LLM key 时回退:直推 main 供人工 triage）
        if: steps.disc.outputs.new != '0' && steps.cls.outputs.auto != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ steps.disc.outputs.date }}"
          N="${{ steps.disc.outputs.new }}"
          SITE="https://mbabrand.com/watch/triage.html"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add watch/_candidates
          git commit -m "chore(watch): 每日自动发现候选事件 ${DATE}（${N} 条,前台 triage 待核验）"
          # 候选是**暂存草稿**(非审计改分):优先直推 main,让生产站 /watch/triage.html
          # 立刻显示新信号 → 用户在前台打勾采纳/打叉丢弃,无需读 PR diff。反捏造边界不变:
          # 标题/日期/URL 取自源 feed;dim/severity/direction/lens 仍由人工在 triage 页判定后才入库。
          if git push origin HEAD:main 2>/tmp/push.err; then
            echo "✅ 候选已直推 main → 前台 triage:${SITE}"
            echo "### 每日舆情候选 ${DATE}（${N} 条）" >> "$GITHUB_STEP_SUMMARY"
            echo "已直推 main。**在前台打勾采纳/打叉丢弃**(不必读 diff):${SITE}" >> "$GITHUB_STEP_SUMMARY"
          else
            # main 有保护/直推被拒 → 回退到候选分支 + PR(尽力而为),triage 页可在该 PR 的
            # Cloudflare 预览部署上使用。
            BR="watch-discover/${DATE}"
            git branch -f "$BR" HEAD
            git push -f origin "$BR"
            TITLE="chore(watch): 每日舆情候选 ${DATE}（${N} 条,前台 triage 待核验）"
            BODY=$'自动发现的舆情候选事件(Google News RSS)。**在前台 triage 页打勾采纳/打叉丢弃,不必读本 diff**——本 PR 的 Cloudflare 预览部署 `/watch/triage.html` 即可操作;或合并后在生产站 https://mbabrand.com/watch/triage.html。\n\n反捏造:标题/日期/URL 取自源 feed;dim/severity/direction/lens 由人工在 triage 页判定后才入库(脚本不打分,docs/15 §边界)。'
            COMPARE="${{ github.server_url }}/${{ github.repository }}/pull/new/${BR}"
            if gh pr create --base main --head "$BR" --title "$TITLE" --body "$BODY" 2>/tmp/pr.err; then
              echo "✅ 直推 main 被拒,已回退开 PR(triage 在预览部署可用)。"
            elif gh pr edit "$BR" --title "$TITLE" --body "$BODY" 2>/dev/null; then
              echo "✅ 同分支已有 PR,已更新。"
            else
              echo "::notice title=候选已推送分支::直推 main 与开 PR 均被拒。分支 ${BR} 已推送,手动开 PR:${COMPARE}"
              echo "### 每日舆情候选 ${DATE}（${N} 条）" >> "$GITHUB_STEP_SUMMARY"
              echo "直推 main 被拒、自动开 PR 也被拒。**手动开 PR** → ${COMPARE}" >> "$GITHUB_STEP_SUMMARY"
              sed 's/^/  push.err: /' /tmp/push.err || true
              sed 's/^/  pr.err: /' /tmp/pr.err || true
            fi
          fi
