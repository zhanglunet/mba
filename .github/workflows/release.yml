name: Release

# Cut a GitHub Release (and its tag) from CI. Runs with GITHUB_TOKEN, which can
# create tags/releases — handy when a local/proxy environment can't push tags.
# Trigger manually from the Actions tab ("Run workflow"), or via the GitHub API
# / MCP. Idempotent: re-running for an existing tag is a no-op.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, e.g. v0.2.30. Leave blank to derive from metric-brand-auditor/SKILL.md `version:`."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            TAG="$INPUT_VERSION"
          else
            VER=$(grep -m1 '^version:' metric-brand-auditor/SKILL.md | awk '{print $2}' | tr -d '[:space:]')
            TAG="v$VER"
          fi
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "::error::refusing to release malformed tag '$TAG' (expected vMAJOR.MINOR.PATCH)"; exit 1 ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG (target $GITHUB_SHA)"

      - name: Build release notes from CHANGELOG
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Extract the CHANGELOG section whose heading starts with "## <TAG>"
          # (up to the next "## v..." heading). Falls back to auto-notes if absent.
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$TAG" '
              $0 ~ ("^## " tag "( |$)") { f=1; print; next }
              f && /^## v[0-9]/         { exit }
              f                          { print }
            ' CHANGELOG.md > notes.md
          fi
          if [ -s notes.md ]; then
            printf '%s\n\n---\n**Full Changelog**: %s/compare/v0.2.36...%s\n' \
              "$(cat notes.md)" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" "$TAG" > notes.md
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
            echo "Using CHANGELOG.md section for $TAG"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG section for $TAG — will auto-generate notes"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          HAVE_NOTES: ${{ steps.notes.outputs.have_notes }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "$HAVE_NOTES" = "true" ]; then
              gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
              echo "Updated existing release $TAG notes from CHANGELOG."
            else
              echo "Release $TAG exists and no CHANGELOG section — nothing to do."
            fi
            exit 0
          fi
          if [ "$HAVE_NOTES" = "true" ]; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
          fi
          echo "Created release $TAG at $GITHUB_SHA"
