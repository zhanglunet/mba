# metric-brand-auditor/panels/auto.yaml
#
# 汽车 / 电动车 panel —— 5 位创始人 CEO 视角。
# 通过 industries.yaml 被 `--industry auto` / `--industry ev` 引用。
#
# 状态(2026-05-18):5 位 perspective skill 都已存在,panel 可用于 MBA Phase 4。
#   - leijun:full v1(6/6 路调研 + SKILL.md 305 行)
#   - musk / lixiang / libin / hexiaopeng:production-seed v1(6/6 路调研 +
#     quotes.md URL-anchor bank 已落地)。仍待可选增强:更细 timestamp quote pass
#     + 插画头像。
#
# Self-conflict rule:
#   - For Xiaomi / Redmi / Xiaomi Auto / 小米 / 小米汽车 / SU7 audits, use
#     --panel-drop leijun by default.
#   - For Tesla / SpaceX / X / xAI / Neuralink / Starlink / The Boring Company,
#     use --panel-drop musk.
#   - For Li Auto / 理想 / 车和家 / 汽车之家, use --panel-drop lixiang.
#   - For XPeng / 小鹏 / MONA / UC, use --panel-drop hexiaopeng.
#   - For NIO / 蔚来 / Onvo / 乐道 / Firefly / 萤火虫 / 易车, use
#     --panel-drop libin.
#   - If the conflicted judge is kept, his output is founder self-check only and must not be
#     treated as a neutral cross-brand score.

name: auto
display_name: Auto Industry Panel
description: >
  汽车 / 电动车 panel:中国新势力 4 家(理想 / 小鹏 / 蔚来 / 小米)+ Tesla。
  每位都是创始人兼 CEO,视角偏产品 / 制造 / 营销 / 用户社区 / 自动驾驶赌注。
  适合给主机厂、新势力、智能电动品牌做影响力审计。

judges:
  - slug: musk
    display_name_cn: 马斯克
    display_name_en: Elon Musk
    language: en
    weight: 1.0

  - slug: leijun
    display_name_cn: 雷军
    display_name_en: Lei Jun
    language: zh
    weight: 1.0

  - slug: lixiang
    display_name_cn: 李想
    display_name_en: Li Xiang
    language: zh
    weight: 1.0

  - slug: hexiaopeng
    display_name_cn: 何小鹏
    display_name_en: He Xiaopeng
    language: zh
    weight: 1.0

  - slug: libin
    display_name_cn: 李斌
    display_name_en: William Li
    language: zh
    weight: 1.0
