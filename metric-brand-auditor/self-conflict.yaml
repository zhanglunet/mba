# 分数不中立 → 自动建议 `--panel-drop <slug>`。由 `scripts/check_self_conflict.py` 消费:
#   - validate:校验每套 SKILL 的 Self-Conflict Rule 都写了 --panel-drop <own-slug>;本表 slug 都真实。
#   - query:`check_self_conflict.py --brand "<name>" [--panel <name> | --industry <name>]`
#            → 列出命中的评委 + 建议的 --panel-drop flags。
#
# 维护:别名用于**大小写不敏感的子串匹配**(去空格后),中英文都列;宁缺毋滥——
# 只列**确有直接品牌/机构归属**的关联,把握不准的宁可不列(避免误拦)。
# type 仅作说明:founder/owner/exec/creative-director/editor/investor/analyst。
# 权威 --panel-drop 指令仍以各 SKILL 的 Self-Conflict Rule 为准;本表是机器可读的补充。

